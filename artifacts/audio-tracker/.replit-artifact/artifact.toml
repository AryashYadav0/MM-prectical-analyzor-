kind = "web"
previewPath = "/"
title = "Audio Tracker"
version = "1.0.0"
id = "artifacts/audio-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18312

[services.development]
run = "pnpm --filter @workspace/audio-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audio-tracker", "run", "build" ]
publicDir = "artifacts/audio-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18312"
BASE_PATH = "/"
